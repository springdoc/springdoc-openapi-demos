spring:
  application:
    name: demo-spring-boot-mcp
  main:
    web-application-type: servlet
    banner-mode: log
  ai:
    mcp:
      server:
        stdio: false
        type: sync
        protocol: streamable
        streamable-http:
          mcp-endpoint: /mcp
        name: conference-sessions-mcp
        version: 0.0.1
        enabled: true
        instructions: "This server provides session catalog data for Spring I/O 2026"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:9000}
          jwk-set-uri: ${OAUTH2_ISSUER_URI/oauth2/jwks:http://localhost:9000}/oauth2/jwks

server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    connection-timeout: 20000

logging:
  level:
    org.springdoc.demo.mcp: INFO
